default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: execution-protocols
      description: Inter-agent protocol schemas for the meta-orchestration execution pipeline (AgentResult, state, execution conventions)
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/protocols/execution-conventions.md

    - name: pattern-executor-protocol
      description: Reusable runtime for debate, chain, vote, triage orchestration patterns with budget accounting
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/protocols/pattern-executor.md

  agents:
    # Planning agents
    - name: feature-coverage-agent
      description: Audits plan schema, API surface, and features against competitors
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/feature-coverage-agent.md

    - name: strategy-ux-agent
      description: Evaluates positioning, UX, theming, and developer ergonomics
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/strategy-ux-agent.md

    - name: phasing-agent
      description: Reviews phase boundaries, dependencies, and sequencing risks
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/phasing-agent.md

    - name: parallelization-agent
      description: Designs multi-agent execution waves and merge strategy
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/parallelization-agent.md

    - name: agentic-workflow-agent
      description: Decomposes phases into context-bounded tasks for AI agents
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/agentic-workflow-agent.md

    # Execution agents
    - name: contracts-agent
      description: Wave 0 specialist - creates shared types, interfaces, schemas
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/contracts-agent.md
      requires: [skill:execution-protocols]

    - name: implementer-agent
      description: Parallel worker within file ownership boundaries
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/implementer-agent.md
      requires: [skill:execution-protocols]

    - name: wiring-agent
      description: Post-wave integration - barrel files, routes, imports, deps
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/wiring-agent.md
      requires: [skill:execution-protocols]

    - name: verification-agent
      description: Quality gate - typecheck, tests, lint, ownership drift
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/verification-agent.md
      requires: [skill:execution-protocols]

    # Testing agents
    - name: acceptance-criteria-agent
      description: Extracts testable acceptance criteria from plan phases, outputs structured test specs
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/acceptance-criteria-agent.md

    - name: unit-test-agent
      description: Generates unit tests from contracts, acceptance criteria, and source code
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/unit-test-agent.md

    - name: e2e-test-agent
      description: Generates Playwright E2E tests, supports --chrome and bowser integration
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/e2e-test-agent.md

    # Code review agents
    - name: plan-compliance-reviewer
      description: Reviews code against PLAN.md deliverables, schemas, and acceptance criteria
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/plan-compliance-reviewer.md

    - name: security-reviewer
      description: OWASP-focused security audit - injection, auth, XSS, secrets, dependencies
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/security-reviewer.md

    - name: architecture-reviewer
      description: Architecture drift detection - dependency direction, pattern consistency, contracts
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/architecture-reviewer.md

    # Planning agents (extended)
    - name: plan-builder-agent
      description: Creates structured, execution-ready PLAN.md files from project descriptions
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/plan-builder-agent.md

    - name: questioner-agent
      description: Interactive discussion agent for plan refinement
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/questioner-agent.md

    - name: fixer-agent
      description: Applies review findings to code - targeted fixes within file ownership
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/fixer-agent.md

    # Utility agents
    - name: meta-agent
      description: Generates new Claude Code agents, skills, and commands
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/meta-agent.md

    - name: tdd-coach
      description: Drives test-driven development with red-green-refactor
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/agents/tdd-coach.md

  prompts:
    - name: loom-auto
      description: Fully autonomous pipeline - plan, build, test, review, fix loops until done
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-auto.md
      requires: [prompt:loom-roadmap, prompt:loom-review-plan, prompt:loom-execute-plan, prompt:loom-test-plan, prompt:loom-review-code, prompt:loom-fix-code]

    - name: loom-roadmap
      description: Create, track, refine, and visualize project plans and milestones
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-roadmap.md
      requires: [agent:plan-builder-agent, agent:questioner-agent]

    - name: loom-review-plan
      description: Launches 5 planning agents in parallel to review a PLAN.md
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-review-plan.md
      requires: [agent:feature-coverage-agent, agent:strategy-ux-agent, agent:phasing-agent, agent:parallelization-agent, agent:agentic-workflow-agent]

    - name: loom-execute-plan
      description: Wave-by-wave execution orchestrator with automated quality gates
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-execute-plan.md
      requires: [agent:contracts-agent, agent:implementer-agent, agent:wiring-agent, agent:verification-agent, skill:execution-protocols]

    - name: loom-test-plan
      description: Testing pipeline - acceptance criteria, unit tests, E2E tests with Playwright
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-test-plan.md
      requires: [agent:acceptance-criteria-agent, agent:unit-test-agent, agent:e2e-test-agent]

    - name: loom-review-code
      description: Comprehensive code review - built-in + bespoke reviewers in parallel
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-review-code.md
      requires: [agent:security-reviewer, agent:architecture-reviewer, agent:plan-compliance-reviewer]

    - name: loom-fix-code
      description: Apply review findings to code - parse, group, spawn fixer-agents, verify
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-fix-code.md
      requires: [agent:fixer-agent]

    - name: loom-library
      description: Project-level library management for orchestration configs
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom-library.md

    - name: loom
      description: Shows Loom system reference - commands, agents, workflows
      source: https://github.com/launchstack-dev/meta-orchestration/blob/main/commands/loom.md
